<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BAE — chat with your data</title>
<style>
  :root {
    --bg: #F4F1EA;
    --surface: #FFFFFF;
    --surface-2: #F0ECE3;
    --border: #DDD8CD;
    --text: #1C1B1A;
    --text-soft: #6B655A;
    --accent: #C7503A;
    --accent-hover: #B03F2B;
    --accent-soft: #F5E6E2;
    --good: #3A7D5C;
    --error: #C7503A;
    --radius: 0px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'IBM Plex Mono', 'SF Mono', 'Fira Code', monospace;
    --transition: 0.15s ease;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .app { max-width: 1160px; margin: 0 auto; padding: 24px 24px 40px; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 0 20px; margin-bottom: 24px;
    border-bottom: 2px solid var(--text);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 28px; height: 28px;
    background: var(--text);
    color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; font-family: var(--mono);
    border-radius: 0;
  }
  .brand h1 {
    font-size: 18px; font-weight: 500; letter-spacing: -0.2px;
    text-transform: uppercase; margin: 0; line-height: 1.2;
  }
  .brand-tagline {
    font-size: 11px; color: var(--text-soft); margin-top: 2px;
    font-style: italic;
  }
  .brand-sub {
    font-family: var(--mono); font-size: 10px; color: var(--text-soft);
    letter-spacing: 0.5px;
    margin-left: 6px; padding-left: 10px;
    border-left: 1px solid var(--border);
  }
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    min-height: calc(100vh - 120px);
  }
  @media (max-width: 780px) { .layout { grid-template-columns: 1fr; } }
  .sidebar {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .section-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-soft);
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .upload-zone {
    border: 1.5px dashed var(--border);
    padding: 24px 16px;
    text-align: center; cursor: pointer;
    transition: background var(--transition), border-color var(--transition);
  }
  .upload-zone:hover, .upload-zone.drag {
    background: var(--surface-2); border-color: var(--accent);
  }
  .upload-zone input { display: none; }
  .upload-zone p {
    font-size: 12px; color: var(--text-soft); line-height: 1.6;
  }
  .upload-zone p strong { color: var(--text); }
  .schema-list { flex: 1; overflow-y: auto; }
  .clear-btn {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-soft); background: none;
    border: 1px solid var(--border); padding: 6px 0; cursor: pointer;
    width: 100%; text-align: center; margin-top: 8px; transition: all 0.15s;
  }
  .clear-btn:hover { color: var(--accent); border-color: var(--accent); }
  .schema-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .schema-row:last-child { border-bottom: none; }
  .schema-row .col-name { font-family: var(--mono); font-size: 11px; color: var(--text); }
  .schema-row .col-type {
    font-size: 9px; padding: 2px 7px; text-transform: uppercase;
    letter-spacing: 0.5px; font-family: var(--mono);
    background: var(--surface-2); color: var(--text-soft); border-radius: 0;
  }
  .schema-row .col-type.numeric { background: #E6F0E9; color: var(--good); }
  .schema-row .col-type.categorical { background: var(--accent-soft); color: var(--accent); }
  .schema-row .col-type.date { background: #EDE6D8; color: #8B7A50; }
  .schema-row .doc-badge {
    font-size: 9px; padding: 2px 7px; text-transform: uppercase;
    font-family: var(--mono); letter-spacing: 0.3px;
    background: var(--surface-2); color: var(--text-soft);
  }
  .remove-src {
    cursor: pointer; margin-left: 4px; font-size: 11px; font-family: sans-serif;
    color: var(--text-soft); transition: color 0.15s;
  }
  .remove-src:hover { color: var(--error); }
  .schema-row .col-type .remove-src { color: var(--text-soft); font-size: 10px; }
  .status-line {
    font-size: 11px; font-family: var(--mono); color: var(--good);
    padding: 4px 0; line-height: 1.4;
  }
  .status-line.error { color: var(--error); }

  .chat-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 500px;
  }
  .chat-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .chat-head .label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text-soft);
  }
  .chat-head .dot {
    width: 6px; height: 6px; border-radius: 0;
    background: var(--border); display: inline-block; transition: background var(--transition);
  }
  .chat-head .dot.active { background: var(--good); }
  .chat-log {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .empty-state {
    color: var(--text-soft); font-size: 13px; line-height: 1.7;
    margin: 48px auto 0; text-align: center;
  }
  .empty-state .main {
    font-size: 14px; margin-bottom: 4px;
  }
  .empty-state .hint {
    font-family: var(--mono); font-size: 11px;
    padding: 6px 10px; background: var(--surface-2); border: 1px solid var(--border);
    display: inline-block; margin-top: 6px; color: var(--text-soft);
  }
  .bubble { max-width: 90%; animation: pop 0.15s ease; }
  @keyframes pop { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .bubble.user { align-self: flex-end; }
  .bubble.assistant { align-self: flex-start; }
  .bubble .meta {
    font-family: var(--mono); font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-soft); margin-bottom: 4px;
  }
  .bubble.user .meta { text-align: right; }
  .bubble .body {
    padding: 10px 14px;
    font-size: 14px; line-height: 1.6; word-wrap: break-word;
    border: 1px solid var(--border);
  }
  .bubble.user .body {
    background: var(--text); color: var(--bg); border-color: var(--text);
  }
  .bubble.assistant .body {
    background: var(--surface-2); border-color: var(--border);
  }
  table.result-table {
    margin-top: 10px; border-collapse: collapse;
    font-family: var(--mono); font-size: 10px; width: 100%;
    border: 1px solid var(--border);
  }
  table.result-table th, table.result-table td {
    border: 1px solid var(--border);
    padding: 5px 8px; text-align: left;
  }
  table.result-table th {
    background: var(--surface-2);
    text-transform: uppercase; letter-spacing: 0.3px; font-size: 9px;
    color: var(--text-soft);
  }
  .citations {
    margin-top: 8px; display: flex; flex-wrap: wrap; gap: 3px;
  }
  .citation-tag {
    font-family: var(--mono); font-size: 9px;
    border: 1px solid var(--border);
    padding: 2px 6px; color: var(--text-soft);
  }
  .input-row {
    display: flex; gap: 8px;
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
  }
  .input-row input {
    flex: 1; padding: 9px 12px;
    border: 1px solid var(--border);
    font-family: var(--font); font-size: 14px;
    background: var(--surface); color: var(--text);
    transition: border-color var(--transition);
    border-radius: 0;
  }
  .input-row input:focus { outline: none; border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text-soft); }
  .input-row button {
    background: var(--text); color: var(--bg);
    border: none; padding: 0 20px;
    font-family: var(--mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px; cursor: pointer;
    transition: background var(--transition);
    border-radius: 0;
  }
  .input-row button:hover:not(:disabled) { background: var(--accent); }
  .input-row button:disabled { opacity: 0.3; cursor: not-allowed; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="brand-mark">B</div>
      <div>
        <h1>BAE</h1>
        <div class="brand-tagline">talk to your data like it's your bae!</div>
      </div>
    </div>
  </header>

  <div class="layout">
    <div class="sidebar">
      <div class="section-label">Sources</div>
      <label class="upload-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.pdf,.docx,.txt,.md" />
        <p><strong>Drop files</strong> or click to browse<br/>
        <span style="font-size:11px;color:var(--text-soft)">CSV · Excel · PDF · Word · TXT</span></p>
      </label>
      <div id="statusLine" class="status-line"></div>
      <div class="schema-list" id="schemaList"></div>
      <button id="clearBtn" class="clear-btn" style="display:none" onclick="clearSources()">Clear all sources</button>
    </div>

    <div class="chat-panel">
      <div class="chat-head">
        <span class="label">Chat</span>
        <span class="dot" id="statusDot"></span>
      </div>
      <div class="chat-log" id="chatLog">
        <div class="empty-state">
          <div class="main">Upload a file to get started</div>
          works with CSVs, Excel, PDFs, Word docs<br/>
          <span class="hint">try "what is the average age?"</span>
        </div>
      </div>
      <div class="input-row">
        <input type="text" id="questionInput" placeholder="Type your question..." disabled />
        <button id="sendBtn" disabled>Send</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE = "http://localhost:8000";
  let sessionId = null;

  const $ = id => document.getElementById(id);
  const fileInput = $('fileInput');
  const dropZone = $('dropZone');
  const statusLine = $('statusLine');
  const schemaList = $('schemaList');
  const chatLog = $('chatLog');
  const questionInput = $('questionInput');
  const sendBtn = $('sendBtn');
  const statusDot = $('statusDot');

  let structSource = null;

  function ready(on) { statusDot.className = 'dot' + (on ? ' active' : ''); }
  ready(false);

  fileInput.addEventListener('change', e => { if (e.target.files.length) upload(e.target.files[0]); });
  ['dragover','dragleave','drop'].forEach(evt => {
    dropZone.addEventListener(evt, e => {
      e.preventDefault();
      if (evt === 'dragover') dropZone.classList.add('drag');
      if (evt === 'dragleave' || evt === 'drop') dropZone.classList.remove('drag');
    });
  });
  dropZone.addEventListener('drop', e => { if (e.dataTransfer.files.length) upload(e.dataTransfer.files[0]); });

  async function upload(file) {
    statusLine.textContent = 'Processing…'; statusLine.className = 'status-line';
    const fd = new FormData(); fd.append('file', file);
    if (sessionId) fd.append('session_id', sessionId);
    try {
      const r = await fetch(`${API_BASE}/upload`, { method:'POST', body:fd });
      if (!r.ok) throw new Error((await r.json()).detail||'Upload failed');
      const d = await r.json();
      sessionId = d.session_id;
      statusLine.textContent = d.message;
      statusLine.className = 'status-line';
      if (d.schema) { structSource = file.name; renderSchema(d.schema); }
      if (d.documents?.length) renderDocs(d.documents);
      $('clearBtn').style.display = 'block';
      questionInput.disabled = false; sendBtn.disabled = false; ready(true);
      clearEmpty();
    } catch(e) { statusLine.textContent = 'Error: '+e.message; statusLine.className = 'status-line error'; }
  }

  function renderDocs(sources) {
    const el = $('docList'); if (el) el.remove();
    const div = document.createElement('div'); div.id = 'docList';
    div.innerHTML = sources.map(s =>
      `<div class="schema-row"><span class="col-name">${esc(s)}</span><span class="doc-badge">indexed <span class="remove-src" onclick="removeSource('${esc(s)}')">✕</span></span></div>`
    ).join('');
    schemaList.appendChild(div);
  }

  function renderSchema(schema) {
    let html = structSource ? `<div class="schema-row"><span class="col-name">${esc(structSource)}</span><span class="col-type">csv/xlsx <span class="remove-src" onclick="removeSource('${esc(structSource)}')">✕</span></span></div>` : '';
    html += schema.columns.map(c =>
      `<div class="schema-row"><span class="col-name">${esc(c.name)}</span><span class="col-type ${c.type}">${c.type}</span></div>`
    ).join('');
    schemaList.innerHTML = html;
  }

  function clearEmpty() { const e = chatLog.querySelector('.empty-state'); if (e) e.remove(); }

  async function ask() {
    const q = questionInput.value.trim();
    if (!q || !sessionId) return;
    addBubble('user', q);
    questionInput.value = ''; sendBtn.disabled = true;
    const tid = addBubble('assistant', '…');
    try {
      const r = await fetch(`${API_BASE}/query`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ session_id: sessionId, question: q })
      });
      if (!r.ok) throw new Error((await r.json()).detail||'Query failed');
      const d = await r.json();
      updateBubble(tid, d.answer, d.table, d.citations);
    } catch(e) { updateBubble(tid, 'Error: '+e.message, null); }
    finally { sendBtn.disabled = false; }
  }

  sendBtn.addEventListener('click', ask);
  questionInput.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });

  let bc = 0;
  function addBubble(role, text) {
    clearEmpty();
    const id = 'b'+(bc++);
    const div = document.createElement('div');
    div.className = `bubble ${role}`; div.id = id;
    div.innerHTML = `<div class="meta">${role}</div><div class="body">${esc(text)}</div>`;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;
    return id;
  }

  function updateBubble(id, text, table, citations) {
    const div = $(id);
    let h = `<div class="meta">BAE</div><div class="body">${esc(text)}`;
    if (table?.length) h += tbl(table);
    if (citations?.length) h += '<div class="citations">'+citations.map(c =>
      `<span class="citation-tag">${esc(c.source)} · ch ${c.chunk_index} · ${(c.relevance*100).toFixed(0)}%</span>`
    ).join('')+'</div>';
    h += '</div>';
    div.innerHTML = h;
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function tbl(rows) {
    if (!rows?.length) return '';
    const cols = Object.keys(rows[0]);
    let h = '<table class="result-table"><thead><tr>'+cols.map(c => `<th>${esc(c)}</th>`).join('')+'</tr></thead><tbody>';
    rows.slice(0,30).forEach(r => {
      h += '<tr>'+cols.map(c => `<td>${esc(String(r[c]??''))}</td>`).join('')+'</tr>';
    });
    return h+'</tbody></table>';
  }

  function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  async function clearSources() {
    if (!sessionId) return;
    try {
      await fetch(`${API_BASE}/clear`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ session_id: sessionId })
      });
      sessionId = null;
      schemaList.innerHTML = '';
      $('clearBtn').style.display = 'none';
      statusLine.textContent = '';
      questionInput.disabled = true; sendBtn.disabled = true; ready(false);
      chatLog.innerHTML = '<div class="empty-state"><div class="main">Upload a file to get started</div>works with CSVs, Excel, PDFs, Word docs<br/><span class="hint">try "what is the average age?"</span></div>';
    } catch(e) { statusLine.textContent = 'Error clearing: '+e.message; statusLine.className = 'status-line error'; }
  }

  async function removeSource(name) {
    if (!sessionId) return;
    try {
      const r = await fetch(`${API_BASE}/remove-source`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ session_id: sessionId, source: name })
      });
      if (!r.ok) throw new Error((await r.json()).detail||'Failed');
      const d = await r.json();
      if (structSource === name) structSource = null;
      // Re-render with remaining sources
      schemaList.innerHTML = '';
      if (d.schema) { structSource = name === structSource ? null : structSource; renderSchema(d.schema); }
      if (d.sources?.length) renderDocs(d.sources.filter(s => s.type === 'document').map(s => s.name));
      if (!d.schema && !d.sources?.length) {
        $('clearBtn').style.display = 'none';
        questionInput.disabled = true; sendBtn.disabled = true; ready(false);
      }
    } catch(e) { statusLine.textContent = 'Error: '+e.message; statusLine.className = 'status-line error'; }
  }
</script>
</body>
</html>
